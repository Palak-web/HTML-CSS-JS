<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            width: 100%;

        }

        body {
            position: relative;
            overflow: hidden;
        }

        #main {
            width: 100%;
            height: 100%;
            background-color: #222;

        }

        #nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            height: 100px;
            background-color: #444;
        }

        a {
            color: white;
        }

        button {
            padding: 12px 22px;
            background-color: red;
            border-radius: 5px;
            border: none;
            font-weight: 600;
            font-size: 20px;
        }

        ul {
            padding: 30px;
        }

        .lt {
            text-decoration: line-through;
        }
        .a{
            width: 40vw;
            padding: 40px;
            background-color: rgb(175, 16, 42);
        }
        .b{
            padding: 30px;
            background-color: green;
        }
        .c{
            background-color: purple;
        }
        .btn{
            margin: 10px;
            padding: 5px 5px;
            font-size: small;
            background-color: rgb(240, 204, 157);
        }
    </style>
</head>

<body>
    <div class="a">
        <div class="b">
            <div class="c">
                <button class="btn">click me</button>
            </div>
        </div>
    </div>
    

    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Grapes</li>
        <li>Guava</li>
        <li>Mango</li>
    </ul>

    <div id="main">
        <div id="nav">
            <a href="">home</a><a href="">about</a>
            <button>Click and Follow</button>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
