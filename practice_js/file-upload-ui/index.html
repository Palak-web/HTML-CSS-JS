<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;        
        }
        #main{
            color: #5a5858;
            display: flex;
            align-items:center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: #222;
        }
        input{
            display: none;
        }
        #btn{
            padding: 12px 22px;
            color: white;
            background-color: palevioletred;
            border-radius: 5px;
            font-weight: 500px;
        }
        #btn:hover{
            background-color: rgb(212, 35, 94);
        }

    </style>
</head>

<body>
    <div id="main">
        <input id="fileinp" type="file">
        <div id="btn"> Upload File
            
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
