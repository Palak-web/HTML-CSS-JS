<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Add User</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111118;
      color: #ddd;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* ── Form Box ── */
    .form {
      background: #1e1e28;
      border-radius: 10px;
      padding: 30px 28px;
      width: 320px;
      margin: 0 auto 50px;
    }

    .form h2 {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
    }

    .form label {
      display: block;
      font-size: 13px;
      color: #ccc;
      margin-bottom: 5px;
    }

    .form input {
      width: 100%;
      background: #2b2b38;
      border: none;
      border-radius: 5px;
      color: #ddd;
      font-size: 14px;
      padding: 9px 11px;
      margin-bottom: 14px;
      outline: none;
    }

    .form textarea {
      width: 100%;
      background: #2b2b38;
      border: none;
      border-radius: 5px;
      color: #ddd;
      font-size: 14px;
      padding: 9px 11px;
      margin-bottom: 14px;
      height: 75px;
      resize: none;
      outline: none;
    }

    .form button {
      width: 100%;
      padding: 10px;
      background: #2b2b38;
      color: #ccc;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
    }

    /* ── Cards ── */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .card {
      background: #1e1e28;
      border-radius: 10px;
      padding: 24px 18px;
      width: 190px;
      text-align: center;
    }

    .card img {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
    }

    .card .name {
      font-size: 15px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 3px;
    }

    .card .role {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
    }

    .card .bio {
      font-size: 12px;
      color: #bbb;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <!-- Form -->
  <form class="form">
    <h2>Add User</h2>

    <label for="name">Name</label>
    <input id="name" type="text" />

    <label for="role">Role</label>
    <input id="role" type="text" />

    <label for="bio">Bio</label>
    <textarea id="bio"></textarea>

    <label>Photo URL</label>
    <input id="photo" type="text" />

    <button>Submit</button>
  </form>


  <div class="users cards"></div>

  <script src="script.js"></script>
</body>

</html>
