<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse over</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body{
            width: 100%;
            height: 100%;
        }
        #abcd {
            overflow: hidden;
            position: relative;
            position: absolute;
            transition: all cubic-bezier(0.19, 1, 0.22, 1) .2s;
            width: 150px;
            height: 150px;
            background-color: rgb(165, 36, 58);
        }
    </style>
</head>
<body>

    <div id="abcd"></div>
    <script src="script.js"></script>
</body>
</html>
