<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a2e;
            height: 100%;
            width: 100%;
        }

        #main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        form {
            background-color: #16213e;
            padding: 40px;
            border-radius: 12px;
            width: 420px;
        }

        h2 {
            color: #fff;
            font-size: 22px;
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #2d2d4e;
            background-color: #0f3460;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        input::placeholder {
            color: #888;
        }

        input[type="submit"] {
            background-color: #1a7de8;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 5px;
            border-radius: 8px;
            padding: 14px;
        }

        small {
            color: red;
            font-size: 12px;
            display: none;
            margin-top: -15px;
            margin-bottom: 10px;
            display: block;
        }

        #resultMessage {
            color: #5dcaa5;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="main">
        <form autocomplete="off" id="loginFrom">
            <h2>Email & Password Validator</h2>
            <label for="email"> Email:</label>
            <input id="email" type="text" placeholder="Enter your email" autocomplete="email">
            <small id="emailError"></small>
            <label for="password">Password:</label>
            <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
            <small id="passwordError"></small>
            <input type="submit" value="Validate">
            <p id="resultMessage"></p>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
