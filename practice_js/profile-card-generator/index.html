<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        * {
    margin: 0;
    padding: 0;
}

html, body {
    font-family: 'Times New Roman', Times, serif;
    height: 100%;
    width: 100%;
    background-color: #100e2e;
}

input {
    width: 100%;
    border-radius: 7px;
    padding: 10px 14px;
    margin: 8px 0;
    display: block;
    color: #ffffff;
    background-color: #111827;
    border: 1px solid #2d2d4e;
}

input[type="submit"] {
    background-color: #7f77dd;
    color: #ffffff;
    width: 100%;
    border: none;
    cursor: pointer;
}

#main {
    display:flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 30px;
}

form {
    width: 350px;
}

.card {
    width: 350px;
    color: #fff;
    margin-top: 20px;
    border-radius: 10px;
    padding: 20px;
    border: 1px solid #2d2d4e;
    background-color: #111827;
}

.profile {
    width: 50px;
    height: 50px;
    background-color: blue;
    border-radius: 50%;
    margin-bottom: 7px;
    overflow: hidden;
}

.profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card h5 {
    margin-top: 3px;
}

.card p {
    font-size: 12px;
    margin-top: 5px;
    word-break: break-word;
}
    </style>
</head>

<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder="Profile pic">
            <input type="text" placeholder="name">
            <input type="text" placeholder="occupation">
            <input type="text" placeholder="About">
            <input type="submit">
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
