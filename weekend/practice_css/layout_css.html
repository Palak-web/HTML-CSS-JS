<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Web Development</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;

        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(90deg, #ff69b4, #ff1493);
            box-shadow: 0 2px 10px rgba(255, 105, 180, 0.5);
        }

        /* Main Content Area */
        main {
            flex: 1;
            padding-top: 60px;
            padding-bottom: 40px;
        }

        .line {
            background-color: #000;
            padding: 30px;
            border: 3px solid white;
            margin: 20px auto;
            max-width: 700px;
        }

        .green-container {
            background-color: #2d5016;
            padding: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        /* Pink Square */
        .pink-square {
            width: 200px;
            height: 200px;
            background-color: #ff9999;
        }

        /* Blue Square */
        .blue-square {
            width: 200px;
            height: 200px;
            background-color: #6699cc;
        }

        /* 3. BLACK WELCOME BOX */
        .welcome-box {
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 40px 30px;
            margin: 40px auto;
            max-width: 500px;
            border: 2px solid #444;
            border-radius: 20px;
        }

        .welcome-box h2 {
            font-size: 20px;
            line-height: 1.6;
            font-weight: normal;
        }

        /* 4. WHITE FOOTER */
        .footer {
            background-color: white;
            color: #333;
            text-align: center;
            padding: 30px 20px;
            margin-top: auto;
        }

        /* 5. ORANGE STICKY LOGO (Bottom-right) */
        .sticky-logo {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: #ff8c42;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.6);
            z-index: 999;
            transition: transform 0.3s ease;
        }

        .sticky-logo:hover {
            transform: scale(1.1);
        }

        .sticky-logo::before {
            content: "Σ";
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .green-container {
                flex-direction: column;
                align-items: center;
            }

            .pink-square,
            .blue-square {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar"></nav>

    <main>
        <div class="line">
            <div class="green-container">
                <div class="pink-square"></div>
                <div class="blue-square"></div>
            </div>

            <div class="welcome-box">
                <h2>Welcome to this Sigma Web<br>Development Express</h2>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2025 Sigma Web Development. All rights reserved.</p>
    </footer>

    <div class="sticky-logo"></div>
</body>

</html>
